<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zockerverband</title>
  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }
    nav { background:#020617; padding:15px; display:flex; gap:20px; }
    nav a { color:white; text-decoration:none; }
    section { padding:40px; display:none; }
    section.active { display:block; }
    button { padding:10px; margin:5px; }
    .card { background:#1e293b; padding:20px; border-radius:10px; margin:10px 0; }
    input { padding:8px; margin:5px; }
  </style>
</head>
<body>

<nav>
  <a href="#" onclick="show('home')">Startseite</a>
  <a href="#" onclick="show('login')">Login</a>
  <a href="#" onclick="show('participation')">Teilnahme</a>
</nav>

<section id="home" class="active">
  <h1>Zockerverband</h1>
  <p>Wir sind der Zockerverband – eine Gaming-Community.</p>
  <p>Erstellt vom Team Zockerverband</p>
</section>

<section id="login">
  <h1>Login</h1>
  <input id="username" placeholder="Name">
  <button onclick="login()">Login</button>
  <p id="userStatus"></p>
</section>

<section id="participation">
  <h1>Event Teilnahme</h1>
  <div id="eventList"></div>
</section>

<script>
function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// LOGIN SYSTEM
let currentUser = localStorage.getItem("user") || "";

function login(){
  let name = document.getElementById("username").value;
  if(!name) return alert("Name eingeben!");
  localStorage.setItem("user", name);
  currentUser = name;
  document.getElementById("userStatus").innerText = "Eingeloggt als: " + name;
  renderEvents();
}

if(currentUser){
  document.getElementById("userStatus").innerText = "Eingeloggt als: " + currentUser;
}

// EVENTS + SPEICHERUNG
let events = JSON.parse(localStorage.getItem("events")) || [
  {name:"Gartic Phone", players:[]},
  {name:"Codenames", players:[]},
  {name:"Film Event", players:[]},
  {name:"Valorant", players:[]},
  {name:"Rainbow Six Siege", players:[]},
  {name:"Fortnite", players:[]},
  {name:"Minecraft", players:[]},
  {name:"Among Us", players:[]}
];

function save(){
  localStorage.setItem("events", JSON.stringify(events));
}

function renderEvents(){
  let el = document.getElementById('eventList');
  el.innerHTML = '';
  events.forEach((e,i)=>{
    let div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3>${e.name}</h3>
    <p>Teilnehmer: ${e.players.join(', ') || 'Keine'}</p>
    <button onclick="join(${i})">Anmelden</button>
    <button onclick="leave(${i})">Abmelden</button>`;
    el.appendChild(div);
  });
}

function join(i){
  if(!currentUser) return alert("Bitte zuerst einloggen!");
  if(confirm("Willst du wirklich teilnehmen?")){
    if(!events[i].players.includes(currentUser)){
      events[i].players.push(currentUser);
      save();
      renderEvents();
    }
  }
}

function leave(i){
  if(!currentUser) return alert("Bitte zuerst einloggen!");
  let reason = prompt("Warum meldest du dich ab?");
  events[i].players = events[i].players.filter(p=>p!==currentUser);
  save();
  alert("Abmeldung gespeichert: " + reason);
  renderEvents();
}

renderEvents();
</script>

</body>
</html>
