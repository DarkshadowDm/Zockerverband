<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zockerverband</title>
<style>
body {
  font-family: Arial;
  margin:0;
  color:white;
  background: linear-gradient(270deg,#020617,#0f172a,#1e293b,#020617);
  background-size:800% 800%;
  animation:bg 15s ease infinite;
}
@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
nav {background:rgba(0,0,0,0.7);padding:15px;display:flex;gap:15px}
nav a {color:white;text-decoration:none;font-weight:bold}
section {display:none;padding:30px}
section.active {display:block}
.card {background:rgba(30,41,59,0.8);padding:15px;margin:10px 0;border-radius:12px}
button {padding:8px;border:none;border-radius:6px;cursor:pointer}
input {padding:6px;margin:5px;border-radius:6px;border:none}
</style>
</head>
<body>

<nav>
<a onclick="show('home')">Start</a>
<a onclick="show('login')">Login</a>
<a onclick="show('events')">Events</a>
<a onclick="show('voting')">Voting</a>
<a onclick="show('admin')">Admin</a>
</nav>

<section id="home" class="active">
<h1>Zockerverband</h1>
<p>Gaming Community für Events & Competition</p>
<p>Erstellt vom Team Zockerverband</p>
<h3 id="nextEvent"></h3>
</section>

<section id="login">
<h2>Login</h2>
<input id="name" placeholder="Name">
<button onclick="login()">Login</button>
<p id="status"></p>
</section>

<section id="events">
<h2>Events</h2>
<div id="eventList"></div>
</section>

<section id="voting">
<h2>Voting</h2>
<div id="voteList"></div>
</section>

<section id="admin">
<h2>Admin Panel</h2>
<input id="newEvent" placeholder="Neues Event">
<button onclick="addEvent()">Event hinzufügen</button>
<div id="adminEvents"></div>
</section>

<script>
function show(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

let user = localStorage.getItem('user') || '';
if(user) document.getElementById('status').innerText = "Eingeloggt als: "+user;

function login(){
 let n=document.getElementById('name').value;
 if(!n)return alert('Name!');
 user=n;
 localStorage.setItem('user',n);
 document.getElementById('status').innerText="Eingeloggt als: "+n;
}

let events = JSON.parse(localStorage.getItem('events')) || [
{name:'Fortnite',players:[]},
{name:'Minecraft',players:[]},
{name:'Valorant',players:[]}
];

function save(){localStorage.setItem('events',JSON.stringify(events));}

function renderEvents(){
 let el=document.getElementById('eventList');
 el.innerHTML='';
 events.forEach((e,i)=>{
 let d=document.createElement('div');
 d.className='card';
 d.innerHTML=`<b>${e.name}</b><br>Teilnehmer: ${e.players.join(', ')||'Keine'}<br>
 <button onclick="join(${i})">Join</button>
 <button onclick="leave(${i})">Leave</button>`;
 el.appendChild(d);
 });
}

function join(i){
 if(!user)return alert('Login nötig');
 if(confirm('Wirklich teilnehmen?')){
 if(!events[i].players.includes(user)){
 events[i].players.push(user);
 save();renderEvents();
 }
 }
}

function leave(i){
 if(!user)return alert('Login nötig');
 let reason=prompt('Grund?');
 events[i].players=events[i].players.filter(p=>p!==user);
 save();alert('Abmeldung: '+reason);renderEvents();
}

renderEvents();

// VOTING
let votes = JSON.parse(localStorage.getItem('votes')) || [
{name:'Fortnite',v:0},
{name:'Minecraft',v:0},
{name:'Valorant',v:0}
];

function saveVotes(){localStorage.setItem('votes',JSON.stringify(votes));}

function renderVotes(){
 let el=document.getElementById('voteList');
 el.innerHTML='';
 votes.forEach((v,i)=>{
 let d=document.createElement('div');
 d.className='card';
 d.innerHTML=`${v.name} (${v.v}) <button onclick="vote(${i})">Vote</button>`;
 el.appendChild(d);
 });
}

function vote(i){votes[i].v++;saveVotes();renderVotes();updateNext();}

renderVotes();

function updateNext(){
 let top=votes.sort((a,b)=>b.v-a.v)[0];
 document.getElementById('nextEvent').innerText="Nächstes Event: "+top.name;
}
updateNext();

// ADMIN
function addEvent(){
 let name=document.getElementById('newEvent').value;
 if(!name)return;
 events.push({name:name,players:[]});
 save();renderEvents();renderAdmin();
}

function renderAdmin(){
 let el=document.getElementById('adminEvents');
 el.innerHTML='';
 events.forEach((e,i)=>{
 let d=document.createElement('div');
 d.className='card';
 d.innerHTML=`${e.name} <button onclick="deleteEvent(${i})">Löschen</button>`;
 el.appendChild(d);
 });
}

function deleteEvent(i){
 events.splice(i,1);
 save();renderEvents();renderAdmin();
}

renderAdmin();

// AUTO SYSTEME
setInterval(()=>{console.log('Voting Update');},7200000);
setInterval(()=>{
 votes.forEach(v=>v.v=0);
 saveVotes();
 alert('Neue Voting Runde!');
 renderVotes();
},259200000);

// DISCORD BOT PLACEHOLDER
function sendDiscord(msg){
 console.log('Discord Nachricht:',msg);
}

</script>
</body>
</html>
