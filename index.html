<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zockerverband</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

/* GOOGLE STYLE LOGIN */
#loginContainer {
  background: white;
  padding: 60px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  text-align: center;
  width: 90%;
  max-width: 400px;
}
#loginContainer h1 {
  margin-bottom: 30px;
  color: #202124;
}
#loginContainer input {
  width: 80%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 24px;
  border: 1px solid #ccc;
  font-size: 16px;
}
#loginContainer button {
  width: 85%;
  padding: 12px;
  margin-top: 20px;
  border-radius: 24px;
  border: none;
  background-color: #1a73e8;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
#loginContainer button:hover {
  background-color: #155ab6;
}
#navBar {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
#navBar a {
  text-decoration: none;
  color: #1a73e8;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>
<body>

<div id="navBar">
  <a onclick="show('home')">Start</a>
  <a onclick="show('voting')">Voting</a>
  <a onclick="show('events')">Events</a>
  <a onclick="show('partner')">Partner Suche</a>
  <a onclick="show('signup')">Anmelden</a>
  <a onclick="show('dashboard')">Team Dashboard</a>
</div>

<section id="home" class="active">
  <h1>Zockerverband</h1>
  <p>Erstellt vom Team Zockerverband</p>
  <h2 id="nextEvent"></h2>
</section>

<section id="signup">
  <div id="loginContainer">
    <h1>Willkommen</h1>
    <input id="name" placeholder="Name">
    <button onclick="login()">Einloggen</button>
    <p id="status"></p>
    <button onclick="connectDiscord()">Mit Discord verbinden</button>
    <p id="discordStatus"></p>
  </div>
</section>

<section id="voting">
  <h2>Voting</h2>
  <div id="votes"></div>
</section>

<section id="events">
  <h2>Events</h2>
  <div id="eventList"></div>
</section>

<section id="partner">
  <h2>Partner Suche</h2>
  <input id="partnerInput" placeholder="Suche Spieler">
  <button onclick="addPartner()">Post</button>
  <div id="partnerList"></div>
</section>

  <div id="
