<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zockerverband</title>
<style>
body{
 margin:0;
 font-family:Arial;
 color:white;
 background: radial-gradient(circle at top, #ff00cc, #3333ff, #000);
 overflow-x:hidden;
}
nav{background:rgba(0,0,0,0.7);padding:15px;display:flex;gap:15px}
nav a{cursor:pointer}
section{display:none;padding:30px}
section.active{display:block}
.card{background:rgba(0,0,0,0.6);padding:15px;margin:10px 0;border-radius:12px}
button{padding:8px;border:none;border-radius:6px;cursor:pointer}
input{padding:6px;margin:5px;border-radius:6px;border:none}
</style>
</head>
<body>

<nav>
<a onclick="show('home')">Start</a>
<a onclick="show('login')">Login</a>
<a onclick="show('voting')">Voting</a>
<a onclick="show('events')">Events</a>
<a onclick="show('partner')">Partner</a>
</nav>

<section id="home" class="active">
<h1>Zockerverband</h1>
<p>Community für Gaming Events und Competition</p>
<p>Erstellt vom Team Zockerverband</p>
<h2 id="nextEvent"></h2>
</section>

<section id="login">
<h2>Account erstellen / Login</h2>
<input id="name" placeholder="Name">
<button onclick="login()">Login</button>
<p id="status"></p>
</section>

<section id="voting">
<h2>Voting System</h2>
<div id="votes"></div>
</section>

<section id="events">
<h2>Event Teilnahme</h2>
<div id="eventList"></div>
</section>

<section id="partner">
<h2>Games Partner Suche</h2>
<input id="partnerInput" placeholder="Suche Spieler">
<button onclick="addPartner()">Post</button>
<div id="partnerList"></div>
</section>

<script>
function show(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// LOGIN + SPEICHER
let user=localStorage.getItem('user')||'';
if(user)document.getElementById('status').innerText='Eingeloggt als '+user;

function login(){
 let n=document.getElementById('name').value;
 if(!n)return alert('Name eingeben');
 user=n;
 localStorage.setItem('user',n);
 document.getElementById('status').innerText='Eingeloggt als '+n;
}

// EVENTS
let events=JSON.parse(localStorage.getItem('events'))||[
{name:'Fortnite',players:[]},
{name:'Minecraft',players:[]},
{name:'Valorant',players:[]}
];

function save(){localStorage.setItem('events',JSON.stringify(events));}

function renderEvents(){
 let el=document.getElementById('eventList');
 el.innerHTML='';
 events.forEach((e,i)=>{
 let d=document.createElement('div');
 d.className='card';
 d.innerHTML=`<b>${e.name}</b><br>${e.players.join(', ')||'Keine'}<br>
 <button onclick="join(${i})">Anmelden</button>
 <button onclick="leave(${i})">Abmelden</button>`;
 el.appendChild(d);
 });
}

function join(i){
 if(!user)return alert('Login nötig');
 if(confirm('Wirklich anmelden?')){
 events[i].players.push(user);
 save();renderEvents();
 sendDiscord(user+' hat sich angemeldet');
 notifyUsers();
 }
}

function leave(i){
 if(!user)return alert('Login nötig');
 if(confirm('Wirklich abmelden?')){
 let reason=prompt('Grund?');
 events[i].players=events[i].players.filter(p=>p!==user);
 save();renderEvents();
 sendDiscord(user+' hat sich abgemeldet: '+reason);
 }
}

renderEvents();

// VOTING
let votes=JSON.parse(localStorage.getItem('votes'))||[
{name:'Fortnite',v:0},
{name:'Minecraft',v:0},
{name:'Valorant',v:0}
];

function saveVotes(){localStorage.setItem('votes',JSON.stringify(votes));}

function renderVotes(){
 let el=document.getElementById('votes');
 el.innerHTML='';
 votes.forEach((v,i)=>{
 let d=document.createElement('div');
 d.className='card';
 d.innerHTML=`${v.name} (${v.v}) <button onclick="vote(${i})">Vote</button>`;
 el.appendChild(d);
 });
}

function vote(i){
 votes[i].v++;
 saveVotes();
 renderVotes();
 updateWinner();
}

function updateWinner(){
 let win=votes.sort((a,b)=>b.v-a.v)[0];
 document.getElementById('nextEvent').innerText='Nächstes Event: '+win.name;
}

renderVotes();updateWinner();

// AUTO SYSTEM
setInterval(()=>{console.log('Voting Update');},7200000);
setInterval(()=>{
 votes.forEach(v=>v.v=0);
 saveVotes();
 alert('Neue Events im Voting!');
 renderVotes();
},259200000);

// NOTIFY USER
function notifyUsers(){
 alert('Neues Event bald! Check Startseite');
}

// DISCORD PLACEHOLDER
function sendDiscord(msg){
 console.log('Discord:',msg);
}

// PARTNER
function addPartner(){
 let t=document.getElementById('partnerInput').value;
 if(!t)return;
 let d=document.createElement('div');
 d.className='card';
 d.innerText=t;
 document.getElementById('partnerList').appendChild(d);
}

</script>

</body>
</html>
